name: Verdict Check

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  verdict:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @drumr/db db:generate

      - run: pnpm --filter @drumr/agent worker verdict
        timeout-minutes: 10
